[sandbox]
mounts = []

[sandbox.paths]
traversal = [
    "~",
    "~/.local",
    "~/.ssh",
    "~/.agents",
]
read = [
    "~/.npm-global",
    "~/.bashrc",
    "~/.bash_profile",
    "~/.profile",
    "~/.local/bin",
    "~/.npmrc",
    "~/.ssh/known_hosts",
    "~/.ssh/config",
    "~/.ssh/config.d",
    "~/.password-store",
    "~/.gitconfig",
    "~/.config/git",
    "~/.gitconfig_local",
    "~/.config/gh",
    "~/.agents/skills",
]
read_write = [
    "~/.gemini",
    "~/.npm",
    "~/.local/share/keyrings",
    "~/.local/share/kwalletd",
    "~/.claude",
    "~/.claude.json*",
    "~/.claude.lock",
    "~/.local/share/claude",
    "~/.cache/claude",
    "~/.codex",
]

[proxy]
domain_allowlist = [
    "generativelanguage.googleapis.com",
    "aiplatform.googleapis.com",
    "cloudresourcemanager.googleapis.com",
    "oauth2.googleapis.com",
    "accounts.google.com",
    "registry.npmjs.org",
    "*.npmjs.org",
    "api.anthropic.com",
    "statsig.anthropic.com",
    "sentry.io",
    "github.com",
    "api.github.com",
    "raw.githubusercontent.com",
    "objects.githubusercontent.com",
    "codeload.github.com",
    "api.openai.com",
    "*.openai.com",
]
