[sandbox]
mounts = []

[sandbox.paths]
traversal = [
    "~",
    "~/.local",
    "~/.ssh",
    "~/.agents",
]
read = [
    "~/.bashrc",
    "~/.bash_profile",
    "~/.profile",
    "~/.npmrc",
    "~/.ssh/known_hosts",
    "~/.ssh/config",
    "~/.ssh/config.d",
    "~/.password-store",
    "~/.gitconfig",
    "~/.config/git",
    "~/.gitconfig_local",
    "~/.config/gh",
    "~/.agents/skills",
    "~/.cargo/env",
]
execute = ["~/.local/bin"]
read_write = [
    "~/.npm",
    "~/.local/share/keyrings",
    "~/.local/share/kwalletd",
    "~/.claude",
    "~/.claude.json",
    "~/.claude.lock",
    "~/.local/share/claude",
    "~/.cache/claude",
    "~/.codex",
    "~/.gemini",
    "~/.cargo",
    "~/.rustup",
]

[proxy]
domain_allowlist = [
    "registry.npmjs.org",
    "*.npmjs.org",
    "api.anthropic.com",
    "statsig.anthropic.com",
    "sentry.io",
    "github.com",
    "api.github.com",
    "raw.githubusercontent.com",
    "objects.githubusercontent.com",
    "codeload.github.com",
    "api.openai.com",
    "*.openai.com",
    "generativelanguage.googleapis.com",
    "aiplatform.googleapis.com",
    "cloudresourcemanager.googleapis.com",
    "oauth2.googleapis.com",
    "accounts.google.com",
    "cloudcode-pa.googleapis.com",
    "play.googleapis.com",
    "www.googleapis.com",
    "crates.io",
    "static.crates.io",
    "index.crates.io",
]
